
<div class="auth-page-wrapper">
<div class="auth-card">
  <h2>Create Your Account</h2>

  <div class="form-group">
    <input type="text" class="form-control" [(ngModel)]="userName" placeholder="Username">
  </div>

  <div class="form-group">
    <input type="text" class="form-control" [(ngModel)]="userPasskey" placeholder="Passkey (e.g., 1234)">
  </div>

  <button class="btn-primary" (click)="createUser()">Create Account</button>

  <div class="error-message">{{ userNameTaken() }}</div>

  <div class="divider"></div>

  <a routerLink="/login" class="link-as-button">Already have an account? Login</a>
</div>

</div>
